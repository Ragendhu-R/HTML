<!DOCTYPE html>
<html>
<head>
    <title>Malayalam Movie Survey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Malayalam Movie Survey</h1>
    <p>Please share your opinions about Malayalam movies.</p>

    <form>

        <label>Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Age:</label><br>
        <input type="number" name="age"><br><br>

        <label>Favorite Malayalam Movie Genre:</label><br>
        <select name="genre">
            <option>Action</option>
            <option>Comedy</option>
            <option>Drama</option>
            <option>Thriller</option>
            <option>Romance</option>
            <option>Horror</option>
        </select><br><br>

        <label>How often do you watch Malayalam movies?</label><br>
        <input type="radio" name="watch"> Daily<br>
        <input type="radio" name="watch"> Weekly<br>
        <input type="radio" name="watch"> Monthly<br>
        <input type="radio" name="watch"> Rarely<br><br>

        <label>Which streaming platforms do you use?</label><br>
        <input type="checkbox" name="platform"> Netflix<br>
        <input type="checkbox" name="platform"> Amazon Prime Video<br>
        <input type="checkbox" name="platform"> Disney+ Hotstar<br>
        <input type="checkbox" name="platform"> SonyLIV<br><br>

        <label>Favorite Malayalam Actor:</label><br>
        <input type="text" name="actor"><br><br>

        <label>Your Opinion on Malayalam Cinema:</label><br>
        <textarea rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Submit Survey">

    </form>

</body>
</html>
